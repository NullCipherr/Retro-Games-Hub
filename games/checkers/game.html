<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Checkers - Jogo</title>
    <link rel="stylesheet" href="../../assets/css/game-ui.css">
    <link rel="stylesheet" href="../../assets/css/game-ui-legacy-bridge.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>

<body class="game-ui-body">
    <div class="app-container">
        <header class="game-header">
            <h1>NEON <span class="highlight">CHECKERS</span></h1>
            <button id="btn-menu-return" class="header-btn">← Menu</button>
        </header>

        <main class="game-layout">
            <div class="game-board-container">
                <canvas id="checkers-board" width="600" height="600"></canvas>

                <!-- Menu Overlay -->
                <div id="menu-overlay" class="modal">
                    <div class="modal-content menu-content">
                        <h2 class="menu-title">NEON <span class="highlight">DAMAS</span></h2>
                        <div class="menu-buttons">
                            <button id="btn-start" class="menu-btn primary">Jogar (Local)</button>
                            <button id="btn-quit" class="menu-btn">Voltar ao Menu</button>
                        </div>
                    </div>
                </div>

                <!-- Game Over Modal -->
                <div id="game-over-modal" class="modal hidden">
                    <div class="modal-content">
                        <h2>FIM DE JOGO</h2>
                        <p>Vencedor: <span id="winner-display" class="highlight">Branco</span></p>
                        <div class="modal-buttons">
                            <button id="restart-btn">Nova Partida</button>
                            <button id="menu-from-gameover" class="secondary-btn">Menu Principal</button>
                        </div>
                    </div>
                </div>
            </div>

            <aside class="stats-panel">
                <div class="stat-box">
                    <h3>Turno</h3>
                    <p id="turn-display" style="color: #00f3ff;">Cyan</p>
                </div>
                <div class="stat-box">
                    <h3>Peças Cyan</h3>
                    <p id="cyan-count">12</p>
                </div>
                <div class="stat-box">
                    <h3>Peças Pink</h3>
                    <p id="pink-count">12</p>
                </div>
                <div class="controls-info">
                    <p><span>Click</span> Selecionar/Mover</p>
                    <p><span>R</span> Reiniciar</p>
                </div>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
    <script src="../../assets/js/horizontal-wheel-scroll.js"></script>
</body>

</html>
