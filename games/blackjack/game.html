<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Blackjack - Jogo</title>
    <link rel="stylesheet" href="../../assets/css/game-ui.css">
    <link rel="stylesheet" href="../../assets/css/game-ui-legacy-bridge.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>

<body class="game-ui-body">
    <div class="app-container">
        <header class="game-header">
            <h1>NEON <span class="highlight">BLACKJACK</span></h1>
            <button id="btn-menu-return" class="header-btn">← Menu</button>
        </header>

        <main class="game-layout">
            <div class="game-board-container">
                <canvas id="blackjack-table" width="800" height="600"></canvas>

                <!-- Menu Overlay -->
                <div id="menu-overlay" class="modal">
                    <div class="modal-content menu-content">
                        <h2 class="menu-title">NEON <span class="highlight">21</span></h2>
                        <div class="menu-buttons">
                            <button id="btn-start" class="menu-btn primary">Sentar à Mesa</button>
                            <button id="btn-quit" class="menu-btn">Voltar ao Menu</button>
                        </div>
                    </div>
                </div>

                <!-- Game Over Modal -->
                <div id="game-over-modal" class="modal hidden">
                    <div class="modal-content">
                        <h2 id="result-title">RESULTADO</h2>
                        <p id="result-message" class="game-over-subtitle">Mensagem</p>
                        <div class="modal-buttons">
                            <button id="restart-btn">Nova Mão</button>
                            <button id="menu-from-gameover" class="secondary-btn">Sair da Mesa</button>
                        </div>
                    </div>
                </div>
            </div>

            <aside class="stats-panel">
                <div class="stat-box">
                    <h3>Saldo</h3>
                    <p id="balance">$1000</p>
                </div>
                <div class="stat-box">
                    <h3>Aposta</h3>
                    <p id="current-bet">$0</p>
                </div>
                <div class="controls-info">
                    <div id="betting-controls">
                        <p>Faça sua aposta:</p>
                        <div class="chip-container">
                            <button class="chip-btn" data-value="10">$10</button>
                            <button class="chip-btn" data-value="50">$50</button>
                            <button class="chip-btn" data-value="100">$100</button>
                            <button class="chip-btn action-btn" id="btn-deal">DEAL</button>
                        </div>
                    </div>
                    <div id="action-controls" class="hidden">
                        <button class="action-btn hit" id="btn-hit">HIT (H)</button>
                        <button class="action-btn stand" id="btn-stand">STAND (S)</button>
                        <button class="action-btn double" id="btn-double">DOUBLE (D)</button>
                    </div>
                </div>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
    <script src="../../assets/js/horizontal-wheel-scroll.js"></script>
</body>

</html>
