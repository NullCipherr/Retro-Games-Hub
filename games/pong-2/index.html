<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong 2.0 - ARCGames</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/game-ui.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="game-ui-body">
  <header class="topbar">
    <a class="brand" href="../../index.html">ARCGames</a>
    <nav class="links">
      <a href="../../index.html">Hub</a>
      <a href="docs.html">Guia</a>
    </nav>
  </header>

  <main class="layout">
    <section class="game-shell" aria-label="Área do jogo">
      <canvas id="pongCanvas" width="920" height="520" aria-label="Mesa do Pong"></canvas>
      <div class="overlay" id="startOverlay">
        <h1>Pong 2.0</h1>
        <p>Partida contra IA adaptativa, rally mais rápido e controle preciso.</p>
        <button id="startBtn">Iniciar confronto</button>
      </div>
    </section>

    <aside class="panel" aria-label="Painel de status">
      <h2>Placar</h2>
      <p><strong>Você:</strong> <span id="playerScore">0</span></p>
      <p><strong>IA:</strong> <span id="aiScore">0</span></p>
      <p><strong>Melhor streak:</strong> <span id="bestStreak">0</span></p>
      <p><strong>Streak atual:</strong> <span id="currentStreak">0</span></p>
      <div class="controls">
        <h3>Controles</h3>
        <ul>
          <li>W/S ou setas: mover raquete</li>
          <li>Espaço: sacar</li>
          <li>P: pausar</li>
          <li>R: reiniciar</li>
        </ul>
      </div>
      <p id="statusText" class="status">Primeiro saque em suas mãos.</p>
      <button id="restartBtn" class="secondary">Nova partida</button>
    </aside>
  </main>

  <script src="script.js"></script>
    <script src="../../assets/js/horizontal-wheel-scroll.js"></script>
</body>

</html>
