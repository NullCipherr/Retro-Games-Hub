<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Flappy Bird - Jogo</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>

<body class="game-body">
    <div class="scanlines"></div>
    <div class="app-container">
        <header class="game-header">
            <h1>NEON <span class="highlight">FLAPPY</span></h1>
            <button id="btn-menu-return" class="header-btn">← Menu</button>
        </header>

        <main class="game-layout">
            <div class="game-board-container">
                <canvas id="flappy-bird" width="400" height="700"></canvas>

                <!-- Menu Overlay -->
                <div id="menu-overlay" class="modal">
                    <div class="modal-content menu-content">
                        <h2 class="menu-title">NEON <span class="highlight">FLAPPY</span></h2>
                        <p class="menu-instruction">Clique ou pressione Space para voar!</p>
                        <div class="menu-buttons">
                            <button id="btn-start" class="menu-btn primary">Começar a Voar</button>
                            <button id="btn-quit" class="menu-btn">Voltar ao Menu</button>
                        </div>
                    </div>
                </div>

                <!-- Game Over Modal -->
                <div id="game-over-modal" class="modal hidden">
                    <div class="modal-content">
                        <h2>GAME OVER</h2>
                        <p>Score: <span id="final-score">0</span></p>
                        <p>Best: <span id="final-best">0</span></p>
                        <p class="game-over-subtitle">Você colidiu!</p>
                        <div class="modal-buttons">
                            <button id="restart-btn">Tentar Novamente</button>
                            <button id="menu-from-gameover" class="secondary-btn">Menu Principal</button>
                        </div>
                    </div>
                </div>

                <!-- Pause Modal -->
                <div id="pause-modal" class="modal hidden">
                    <div class="modal-content">
                        <h2>PAUSADO</h2>
                        <div class="modal-buttons">
                            <button id="resume-btn">Continuar</button>
                            <button id="menu-from-pause" class="secondary-btn">Menu Principal</button>
                        </div>
                    </div>
                </div>
            </div>

            <aside class="stats-panel">
                <div class="stat-box">
                    <h3>Score</h3>
                    <p id="score">0</p>
                </div>
                <div class="stat-box">
                    <h3>Best Score</h3>
                    <p id="best-score">0</p>
                </div>
                <div class="stat-box medal-box">
                    <h3>Medalha</h3>
                    <div id="medal" class="medal">🏅</div>
                </div>
                <div class="controls-info">
                    <p><span>Space</span> Voar</p>
                    <p><span>Click</span> Voar</p>
                    <p><span>P</span> Pausar</p>
                </div>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
