<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Tetris - Welcome</title>
    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>

<body class="intro-body">
    <canvas id="intro-bg"></canvas>

    <!-- Navigation Header -->
    <nav class="main-nav intro-nav">
        <a href="../../index.html" class="nav-logo">ARC<span class="highlight">GAMES</span></a>
        <div class="nav-links">
            <a href="../../index.html">🏠 Hub</a>
        </div>
    </nav>

    <!-- Intro Section -->
    <div id="intro-section" class="intro-content">
        <div class="logo-container">
            <h1 class="intro-title" data-text="NEON TETRIS">NEON <span class="highlight">TETRIS</span></h1>
            <div class="logo-glow"></div>
        </div>
        <p class="intro-subtitle">A experiência definitiva de blocos.</p>

        <button id="btn-enter-menu" class="start-button">
            <span>JOGAR</span>
            <div class="btn-glitch"></div>
        </button>
    </div>

    <!-- Menu Overlay (Initially Hidden) -->
    <div id="menu-overlay" class="intro-content menu-page-content hidden">
        <h1 class="menu-title">MENU <span class="highlight">PRINCIPAL</span></h1>

        <div class="menu-buttons">
            <button id="btn-start-game" class="menu-btn primary">Iniciar Jogo</button>

            <div class="difficulty-selector">
                <span>Dificuldade:</span>
                <select id="difficulty-select">
                    <option value="easy">Fácil</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Difícil</option>
                </select>
            </div>

            <button id="btn-options" class="menu-btn">Opções</button>
            <button id="btn-back-intro" class="secondary-btn">Voltar</button>
        </div>
    </div>

    <!-- Options Modal -->
    <div id="options-modal" class="modal hidden">
        <div class="modal-content">
            <h2>OPÇÕES</h2>
            <div class="option-row">
                <label for="opt-ghost">Ghost Piece (Guia)</label>
                <input type="checkbox" id="opt-ghost" checked>
            </div>
            <div class="option-row">
                <label for="opt-particles">Partículas</label>
                <input type="checkbox" id="opt-particles" checked>
            </div>
            <button id="btn-close-options" class="secondary-btn">Voltar</button>
        </div>
    </div>

    <script src="intro.js"></script>
    <script>
        // UI Elements
        const introSection = document.getElementById('intro-section');
        const menuOverlay = document.getElementById('menu-overlay');
        const btnEnterMenu = document.getElementById('btn-enter-menu');
        const btnBackIntro = document.getElementById('btn-back-intro');

        // Menu Logic Elements
        const startBtn = document.getElementById('btn-start-game');
        const diffSelect = document.getElementById('difficulty-select');
        const optionsBtn = document.getElementById('btn-options');
        const closeOptionsBtn = document.getElementById('btn-close-options');
        const optionsModal = document.getElementById('options-modal');
        const ghostCheck = document.getElementById('opt-ghost');
        const particlesCheck = document.getElementById('opt-particles');

        // Transition Logic
        btnEnterMenu.addEventListener('click', () => {
            introSection.classList.add('hidden');
            menuOverlay.classList.remove('hidden');
            menuOverlay.style.animation = 'fadeIn 0.5s ease-out';
        });

        btnBackIntro.addEventListener('click', () => {
            menuOverlay.classList.add('hidden');
            introSection.classList.remove('hidden');
            introSection.style.animation = 'fadeIn 0.5s ease-out';
        });

        // Load saved settings
        if (localStorage.getItem('tetris_difficulty')) {
            diffSelect.value = localStorage.getItem('tetris_difficulty');
        }
        if (localStorage.getItem('tetris_ghost')) {
            ghostCheck.checked = localStorage.getItem('tetris_ghost') === 'true';
        }
        if (localStorage.getItem('tetris_particles')) {
            particlesCheck.checked = localStorage.getItem('tetris_particles') === 'true';
        }

        // Start Game
        startBtn.addEventListener('click', () => {
            localStorage.setItem('tetris_difficulty', diffSelect.value);
            window.location.href = 'index.html';
        });

        // Options Handling
        optionsBtn.addEventListener('click', () => {
            optionsModal.classList.remove('hidden');
        });

        closeOptionsBtn.addEventListener('click', () => {
            optionsModal.classList.add('hidden');
        });

        ghostCheck.addEventListener('change', (e) => {
            localStorage.setItem('tetris_ghost', e.target.checked);
        });

        particlesCheck.addEventListener('change', (e) => {
            localStorage.setItem('tetris_particles', e.target.checked);
        });
    </script>
</body>

</html>
