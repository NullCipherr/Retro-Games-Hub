<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Space Invaders - Jogo</title>
    <link rel="stylesheet" href="../../assets/css/game-ui.css">
    <link rel="stylesheet" href="../../assets/css/game-ui-legacy-bridge.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>

<body class="game-ui-body">
    <div class="app-container">
        <header class="game-header">
            <h1>NEON <span class="highlight">INVADERS</span></h1>
            <button id="btn-menu-return" class="header-btn">← Menu</button>
        </header>

        <main class="game-layout">
            <div class="game-board-container">
                <canvas id="space-invaders" width="640" height="800"></canvas>

                <!-- Menu Overlay -->
                <div id="menu-overlay" class="modal">
                    <div class="modal-content menu-content">
                        <h2 class="menu-title">NEON <span class="highlight">INVADERS</span></h2>
                        <div class="menu-buttons">
                            <button id="btn-start" class="menu-btn primary">Iniciar Missão</button>
                            <button id="btn-quit" class="menu-btn">Voltar ao Menu</button>
                        </div>
                    </div>
                </div>

                <!-- Game Over Modal -->
                <div id="game-over-modal" class="modal hidden">
                    <div class="modal-content">
                        <h2>INVASÃO COMPLETA</h2>
                        <p>Score: <span id="final-score">0</span></p>
                        <p class="game-over-subtitle">A Terra foi conquistada...</p>
                        <div class="modal-buttons">
                            <button id="restart-btn">Tentar Novamente</button>
                            <button id="menu-from-gameover" class="secondary-btn">Menu Principal</button>
                        </div>
                    </div>
                </div>

                <!-- Victory Modal -->
                <div id="victory-modal" class="modal hidden">
                    <div class="modal-content">
                        <h2>VITÓRIA!</h2>
                        <p>Score: <span id="victory-score">0</span></p>
                        <p class="victory-subtitle">Invasão Repelida!</p>
                        <div class="modal-buttons">
                            <button id="next-wave-btn">Próxima Onda</button>
                            <button id="menu-from-victory" class="secondary-btn">Menu Principal</button>
                        </div>
                    </div>
                </div>

                <!-- Pause Modal -->
                <div id="pause-modal" class="modal hidden">
                    <div class="modal-content">
                        <h2>PAUSADO</h2>
                        <div class="modal-buttons">
                            <button id="resume-btn">Continuar</button>
                            <button id="menu-from-pause" class="secondary-btn">Menu Principal</button>
                        </div>
                    </div>
                </div>
            </div>

            <aside class="stats-panel">
                <div class="stat-box">
                    <h3>Pontuação</h3>
                    <p id="score">0</p>
                </div>
                <div class="stat-box">
                    <h3>Vidas</h3>
                    <p id="lives">3</p>
                </div>
                <div class="stat-box">
                    <h3>Onda</h3>
                    <p id="wave">1</p>
                </div>
                <div class="stat-box">
                    <h3>High Score</h3>
                    <p id="high-score">0</p>
                </div>
                <div class="controls-info">
                    <p><span>← →</span> Mover</p>
                    <p><span>Space</span> Atirar</p>
                    <p><span>P</span> Pausar</p>
                </div>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
    <script src="../../assets/js/horizontal-wheel-scroll.js"></script>
</body>

</html>
