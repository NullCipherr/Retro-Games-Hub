<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{NOME_DO_JOGO}} - ARCGames</title>
  <meta name="description" content="{{DESCRICAO_CURTA_DO_JOGO}}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/game-ui.css">
  <style>
    :root {
      --game-ui-cyan: {{COR_PRIMARIA}};
      --game-ui-pink: {{COR_SECUNDARIA}};
    }
  </style>
</head>

<body class="game-ui-body">
  <header class="topbar">
    <a class="brand" href="../../index.html">ARCGames</a>
    <nav class="links">
      <a href="../../index.html">Hub</a>
      <a href="docs.html">Guia</a>
    </nav>
  </header>

  <main class="layout">
    <section class="game-shell" aria-label="Entrada do jogo {{NOME_DO_JOGO}}">
      <div class="overlay overlay-static">
        <h1>{{NOME_DO_JOGO}}</h1>
        <p>{{SUBTITULO_DO_JOGO}}</p>
        <a href="game.html" class="game-ui-btn">Jogar agora</a>
      </div>
    </section>

    <aside class="panel" aria-label="Resumo e controles">
      <h2>Resumo</h2>
      <p>{{RESUMO_DO_JOGO}}</p>

      <div class="controls">
        <h3>Controles</h3>
        <ul>
          <li>{{CONTROLE_1}}</li>
          <li>{{CONTROLE_2}}</li>
          <li>{{CONTROLE_3}}</li>
        </ul>
      </div>

      <p class="status">{{DICA_RAPIDA}}</p>

      <div class="panel-actions">
        <a href="game.html" class="game-ui-btn">Jogar agora</a>
        <a href="docs.html" class="game-ui-btn secondary">Ver documentação</a>
      </div>
    </aside>
  </main>

  <script src="../../assets/js/horizontal-wheel-scroll.js"></script>
</body>

</html>
