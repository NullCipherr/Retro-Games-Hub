<svg width="640" height="220" viewBox="0 0 640 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Retro Games Hub logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A14"/>
      <stop offset="1" stop-color="#151528"/>
    </linearGradient>
    <linearGradient id="accent" x1="80" y1="58" x2="560" y2="162" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F3FF"/>
      <stop offset="0.5" stop-color="#BC13FE"/>
      <stop offset="1" stop-color="#FF006E"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="640" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="1" y="1" width="638" height="218" rx="24" fill="url(#bg)" stroke="#2B2E4A" stroke-width="2"/>
  <g filter="url(#glow)">
    <rect x="52" y="54" width="86" height="86" rx="18" fill="#0B0F1E" stroke="url(#accent)" stroke-width="3"/>
    <path d="M86 83h18M77 92h36M86 101h18" stroke="#00F3FF" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="116" r="6" fill="#FF006E"/>
  </g>

  <text x="172" y="97" fill="#FFFFFF" font-family="Outfit, Arial, sans-serif" font-size="44" font-weight="800">Retro Games</text>
  <text x="172" y="142" fill="url(#accent)" font-family="Outfit, Arial, sans-serif" font-size="44" font-weight="900">Hub</text>

  <text x="52" y="185" fill="#8F93B2" font-family="Outfit, Arial, sans-serif" font-size="18" font-weight="500">
    Colecao retro web com hub unico, filtros e visual neon.
  </text>
</svg>
