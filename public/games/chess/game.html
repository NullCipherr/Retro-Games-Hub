<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Chess - Jogo</title>
    
    <meta name="description" content="Neon Chess - Jogo no Retro Games Hub: jogue agora no navegador com interface retrô." />

    <meta property="og:title" content="Neon Chess - Jogo" />
    <meta property="og:description" content="Neon Chess - Jogo no Retro Games Hub: jogue agora no navegador com interface retrô." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
<link rel="stylesheet" href="../../assets/css/game-ui.css">
    <link rel="stylesheet" href="../../assets/css/game-ui-legacy-bridge.css">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>

<body class="game-ui-body">
    <a class="skip-link" href="#main-content">Pular para o conteúdo principal</a>
    <div class="app-container">
        <header class="game-header">
            <h1>NEON <span class="highlight">CHESS</span></h1>
            <button id="btn-menu-return" class="header-btn">← Menu</button>
        </header>

        <main id="main-content" tabindex="-1" class="game-layout">
            <div class="game-board-container">
                <canvas id="chess-board" width="600" height="600"></canvas>

                <!-- Menu Overlay -->
                <div id="menu-overlay" class="modal">
                    <div class="modal-content menu-content">
                        <h2 class="menu-title">NEON <span class="highlight">CHESS</span></h2>
                        <div class="menu-buttons">
                            <button id="btn-start" class="menu-btn primary">Jogar (Local)</button>
                            <button id="btn-quit" class="menu-btn">Voltar ao Menu</button>
                        </div>
                    </div>
                </div>

                <!-- Game Over Modal -->
                <div id="game-over-modal" class="modal hidden">
                    <div class="modal-content">
                        <h2>XEQUE-MATE</h2>
                        <p>Vencedor: <span id="winner-display" class="highlight">Branco</span></p>
                        <div class="modal-buttons">
                            <button id="restart-btn">Nova Partida</button>
                            <button id="menu-from-gameover" class="secondary-btn">Menu Principal</button>
                        </div>
                    </div>
                </div>

                <!-- Promotion Modal -->
                <div id="promotion-modal" class="modal hidden">
                    <div class="modal-content">
                        <h2>PROMOÇÃO</h2>
                        <p>Escolha sua peça:</p>
                        <div class="promotion-options">
                            <button class="promo-btn" data-piece="q">Rainha</button>
                            <button class="promo-btn" data-piece="r">Torre</button>
                            <button class="promo-btn" data-piece="b">Bispo</button>
                            <button class="promo-btn" data-piece="n">Cavalo</button>
                        </div>
                    </div>
                </div>
            </div>

            <aside class="stats-panel">
                <div class="stat-box">
                    <h3>Turno</h3>
                    <p id="turn-display" style="color: #fff;">Branco</p>
                </div>
                <div class="stat-box">
                    <h3>Status</h3>
                    <p id="game-status">Em Jogo</p>
                </div>
                <div class="stat-box captured-box">
                    <h3>Capturadas</h3>
                    <div id="captured-white" class="captured-pieces"></div>
                    <div id="captured-black" class="captured-pieces"></div>
                </div>
                <div class="controls-info">
                    <p><span>Click</span> Selecionar/Mover</p>
                    <p><span>R</span> Reiniciar</p>
                </div>
            </aside>
        </main>
    </div>
    <script src="script.js"></script>
    <script src="../../assets/js/horizontal-wheel-scroll.js"></script>
</body>

</html>
