<body class="game-ui-body">
    <a class="skip-link" href="#main-content">Pular para o conteúdo principal</a>
  <header class="topbar">
    <a class="brand" href="../../index.html">ARCGames</a>
    <nav class="links" aria-label="Navegação de apoio">
      <a href="../../index.html">Hub</a>
      <a href="docs.html">Guia</a>
    </nav>
  </header>

  <main id="main-content" tabindex="-1" class="layout">
    <section class="board-shell" aria-label="Tabuleiro de memória">
      <div id="board" class="board"></div>
    </section>

    <aside class="panel" aria-label="Painel de status">
      <h1>Memory Match 2.0</h1>
      <p>Encontre todos os pares no menor tempo possível.</p>
      <p><strong>Tempo:</strong> <span id="timer">00:00</span></p>
      <p><strong>Jogadas:</strong> <span id="moves">0</span></p>
      <p><strong>Sequência:</strong> <span id="streak">0</span></p>
      <p><strong>Melhor tempo:</strong> <span id="bestTime">--:--</span></p>
      <p class="status" id="statusText">Clique em duas cartas para começar.</p>

      <button id="restartBtn">Embaralhar e reiniciar</button>

      <div class="controls">
        <h2>Controles</h2>
        <ul>
          <li>Mouse ou toque: virar carta</li>
          <li>R: reiniciar rodada</li>
        </ul>
      </div>
    </aside>
  </main>

  <script src="script.js"></script>
    <script src="../../assets/js/horizontal-wheel-scroll.js"></script>
